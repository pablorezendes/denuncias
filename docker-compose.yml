version: '3.9'

# ============================================================
# Canal de Denúncias HSFA - Stack de desenvolvimento
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL - Banco principal
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hsfa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hsfa_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD nao definido}
      POSTGRES_DB: ${DB_NAME:-denuncias_hsfa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hsfa_admin} -d ${DB_NAME:-denuncias_hsfa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # MinIO - Object Storage (substitui Supabase Storage)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: hsfa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD nao definido}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # Cria bucket padrão no MinIO ao subir
  # ----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: hsfa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-anexos-denuncias}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set none local/$$MINIO_BUCKET;
      echo 'Bucket criado e configurado como privado';
      exit 0;
      "
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # Redis - Rate limiting e cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hsfa-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD nao definido}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # API Backend - Fastify + Drizzle
  # ----------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hsfa-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-hsfa_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-denuncias_hsfa}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-anexos-denuncias}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET nao definido}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@hsfasaude.com.br}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Canal de Denuncias HSFA}
      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-5}
      RATE_LIMIT_LOGIN_WINDOW_MIN: ${RATE_LIMIT_LOGIN_WINDOW_MIN:-15}
      RATE_LIMIT_DENUNCIA_MAX: ${RATE_LIMIT_DENUNCIA_MAX:-3}
      RATE_LIMIT_DENUNCIA_WINDOW_MIN: ${RATE_LIMIT_DENUNCIA_WINDOW_MIN:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # Frontend - React (build) servido via nginx
  # ----------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: hsfa-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - hsfa-net

  # ----------------------------------------------------------
  # pgAdmin - ferramenta opcional (profile: tools)
  # Usar com: docker compose --profile tools up
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hsfa-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hsfasaude.com.br}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles: ["tools"]
    networks:
      - hsfa-net

volumes:
  postgres_data:
  minio_data:
  redis_data:
  pgadmin_data:

networks:
  hsfa-net:
    driver: bridge
