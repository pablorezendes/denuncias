server {
  listen 80;
  server_name _;

  # Limite de upload (10MB por arquivo + margem)
  client_max_body_size 15M;

  # Compressão
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml+rss
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # Security headers aplicados globalmente
  include /etc/nginx/conf.d/security-headers.conf;

  root /usr/share/nginx/html;
  index index.html;

  # Assets do Vite com cache agressivo (conteudo-hashed)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # Reverse proxy da API
  location /api/ {
    proxy_pass http://api:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # Healthcheck passthrough
  location = /health {
    proxy_pass http://api:3001/health;
    access_log off;
  }

  # SPA fallback - corrige o bug de /admin/login nao carregar
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Bloqueia arquivos sensíveis
  location ~ /\.(ht|git|env) {
    deny all;
    return 404;
  }
}
